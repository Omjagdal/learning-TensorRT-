name: Build Windows Desktop Installer

on:
  push:
    branches: [ "main", "master" ]
    tags:     [ "v*" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build React Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Upgrade pip and install packaging first
      run: |
        python -m pip install --upgrade pip
        pip install "packaging>=24.2" --no-cache-dir

    - name: Install CPU-only PyTorch
      run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu --no-cache-dir --no-compile

    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        pip install "numpy<2.0.0" --no-cache-dir --no-compile
        pip install -r requirements.txt --no-cache-dir --no-compile
        pip install pyinstaller pywebview pythonnet platformdirs --no-cache-dir --no-compile

    - name: Download Ollama Windows binary
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "bundle_assets\ollama"
        $url = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
        Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\ollama.zip"
        Expand-Archive -Force "$env:TEMP\ollama.zip" "bundle_assets\ollama"

    - name: Cache Ollama models
      id: cache-ollama-models
      uses: actions/cache@v4
      with:
        path: bundle_assets/ollama_models
        key: ollama-models-qwen3-8b-bge-m3-v2

    - name: Pull AI models into bundle_assets
      if: steps.cache-ollama-models.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $env:OLLAMA_MODELS = "$(Get-Location)\bundle_assets\ollama_models"
        New-Item -ItemType Directory -Force -Path $env:OLLAMA_MODELS
        Start-Process -NoNewWindow "bundle_assets\ollama\ollama.exe" -ArgumentList "serve"
        Start-Sleep -Seconds 15
        & "bundle_assets\ollama\ollama.exe" pull qwen3:8b
        & "bundle_assets\ollama\ollama.exe" pull bge-m3
        Stop-Process -Name "ollama" -Force -ErrorAction SilentlyContinue

    - name: Cache HuggingFace models
      id: cache-hf-models
      uses: actions/cache@v4
      with:
        path: bundle_assets/hf_cache
        key: hf-models-bge-reranker-large-v2

    - name: Download HuggingFace models
      if: steps.cache-hf-models.outputs.cache-hit != 'true'
      shell: pwsh
      env:
        HF_HOME: ${{ github.workspace }}/bundle_assets/hf_cache
      run: |
        python -c "from sentence_transformers import CrossEncoder; CrossEncoder('BAAI/bge-reranker-large'); print('Done.')"

    - name: Build with PyInstaller
      shell: pwsh
      env:
        # Increase PyInstaller memory limits for large AI bundles
        PYTHONMALLOC: default
      run: |
        pyinstaller --clean -y isra_chatbot.spec

    - name: Verify build output
      shell: pwsh
      run: |
        if (!(Test-Path "dist\IsraChatbot\IsraChatbot.exe")) {
          Write-Error "PyInstaller failed - IsraChatbot.exe not found!"
          exit 1
        }
        Write-Host "Build successful! EXE size: $((Get-Item dist\IsraChatbot\IsraChatbot.exe).Length / 1MB) MB"

    - name: Install Inno Setup
      run: choco install innosetup -y
      shell: pwsh

    - name: Create Windows Installer
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "dist\installer"
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\windows_setup.iss"
        if (!(Test-Path "dist\installer\MachineAI_Chatbot_Setup.exe")) {
          Write-Error "Inno Setup failed - installer not created!"
          exit 1
        }
        Write-Host "Installer created! Size: $((Get-Item dist\installer\MachineAI_Chatbot_Setup.exe).Length / 1MB) MB"

    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: MachineAI-Chatbot-Windows-Setup
        path: dist/installer/MachineAI_Chatbot_Setup.exe
        retention-days: 30
