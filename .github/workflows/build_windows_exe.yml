name: Build Windows Desktop Installer

on:
  push:
    branches: [ "main", "master" ]
    tags:     [ "v*" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build React Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Upgrade pip and core tools
      run: |
        python -m pip install --upgrade pip
        pip install "packaging>=24.2" --no-cache-dir

    - name: Install CPU-only PyTorch
      run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu --no-cache-dir --no-compile

    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        pip install "numpy<2.0.0" --no-cache-dir --no-compile
        pip install -r requirements.txt --no-cache-dir --no-compile
        pip install pyinstaller pywebview pythonnet platformdirs --no-cache-dir --no-compile

    - name: Download Ollama Windows binary
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "bundle_assets\ollama"
        $url = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
        Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\ollama.zip"
        Expand-Archive -Force "$env:TEMP\ollama.zip" "bundle_assets\ollama"
        Write-Host "Ollama binary ready: $(Get-ChildItem bundle_assets\ollama\ollama.exe)"

    - name: Build with PyInstaller
      shell: pwsh
      run: pyinstaller --clean -y isra_chatbot.spec

    - name: Verify PyInstaller output
      shell: pwsh
      run: |
        if (!(Test-Path "dist\IsraChatbot\IsraChatbot.exe")) {
          Write-Error "PyInstaller failed - IsraChatbot.exe not found!"
          exit 1
        }
        $sizeMB = [math]::Round((Get-Item dist\IsraChatbot\IsraChatbot.exe).Length / 1MB, 1)
        Write-Host "IsraChatbot.exe built successfully ($sizeMB MB)"

    - name: Install Inno Setup
      shell: pwsh
      run: choco install innosetup -y

    - name: Debug - Check files before Inno Setup
      shell: pwsh
      run: |
        Write-Host "=== Checking icon file ==="
        if (Test-Path "icon.ico") { Write-Host "icon.ico exists" } else { Write-Host "icon.ico MISSING!" }
        Write-Host "=== Checking dist folder ==="
        Get-ChildItem dist\IsraChatbot -Directory | Select-Object -First 5
        Write-Host "=== Checking ISS file ==="
        Get-Content "installer\windows_setup_ci.iss" | Select-Object -First 40

    - name: Create Windows Installer
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "dist\installer"
        # Use CI-specific .iss (no DiskSpanning needed for lightweight build)
        $isccResult = & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\windows_setup_ci.iss" 2>&1
        Write-Host $isccResult
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Inno Setup failed with exit code $LASTEXITCODE"
          Write-Error $isccResult
          exit 1
        }
        if (!(Test-Path "dist\installer\MachineAI_Chatbot_Setup.exe")) {
          Write-Error "Inno Setup did not produce output!"
          exit 1
        }
        $sizeMB = [math]::Round((Get-Item dist\installer\MachineAI_Chatbot_Setup.exe).Length / 1MB, 1)
        Write-Host "Installer created: MachineAI_Chatbot_Setup.exe ($sizeMB MB)"

    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: MachineAI-Chatbot-Windows-Setup
        path: dist/installer/MachineAI_Chatbot_Setup.exe
        retention-days: 30

    - name: Upload Windows Portable Folder
      uses: actions/upload-artifact@v4
      with:
        name: MachineAI-Chatbot-Windows-Portable
        path: dist/IsraChatbot/
        retention-days: 30
