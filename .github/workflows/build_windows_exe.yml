name: Build Windows Desktop Installer

on:
  push:
    branches: [ "main", "master" ]
    tags:     [ "v*" ]
  workflow_dispatch:       # Manual trigger from GitHub Actions tab

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120   # Models are large — give plenty of time

    steps:
    # ── 1. Checkout ────────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Node.js / Frontend ─────────────────────────────────────────────────
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build React Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build

    # ── 3. Python / Backend ───────────────────────────────────────────────────
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install CPU-only PyTorch (avoids 4 GB CUDA download)
      run: |
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        pip install -r requirements.txt
        pip install pyinstaller pywebview platformdirs

    # ── 4. Ollama binary ──────────────────────────────────────────────────────
    - name: Download Ollama Windows binary
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "bundle_assets\ollama"
        $url = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
        Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\ollama.zip"
        Expand-Archive -Force "$env:TEMP\ollama.zip" "bundle_assets\ollama"
        Write-Host "Ollama binary ready."

    # ── 5. Pull AI Models (cached between runs) ───────────────────────────────
    - name: Cache Ollama models
      id: cache-ollama-models
      uses: actions/cache@v4
      with:
        path: bundle_assets/ollama_models
        key: ollama-models-qwen3-8b-bge-m3-v1

    - name: Pull qwen3:8b and bge-m3 into bundle_assets
      if: steps.cache-ollama-models.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        $env:OLLAMA_MODELS = "$(Get-Location)\bundle_assets\ollama_models"
        New-Item -ItemType Directory -Force -Path $env:OLLAMA_MODELS
        Start-Process -NoNewWindow "bundle_assets\ollama\ollama.exe" -ArgumentList "serve"
        Start-Sleep -Seconds 10
        & "bundle_assets\ollama\ollama.exe" pull qwen3:8b
        & "bundle_assets\ollama\ollama.exe" pull bge-m3
        Stop-Process -Name "ollama" -Force -ErrorAction SilentlyContinue
        Write-Host "Models ready."

    # ── 6. Cache HuggingFace models ───────────────────────────────────────────
    - name: Cache HuggingFace models
      id: cache-hf-models
      uses: actions/cache@v4
      with:
        path: bundle_assets/hf_cache
        key: hf-models-bge-reranker-large-marker-v1

    - name: Download HuggingFace models into bundle_assets
      if: steps.cache-hf-models.outputs.cache-hit != 'true'
      shell: pwsh
      env:
        HF_HOME: ${{ github.workspace }}/bundle_assets/hf_cache
      run: |
        python -c "
        from sentence_transformers import CrossEncoder
        CrossEncoder('BAAI/bge-reranker-large')
        print('bge-reranker-large downloaded.')
        "

    # ── 7. PyInstaller ────────────────────────────────────────────────────────
    - name: Build with PyInstaller
      run: |
        pyinstaller --clean -y isra_chatbot.spec

    - name: Verify build output
      run: |
        if (Test-Path "dist\IsraChatbot\IsraChatbot.exe") {
            Write-Host "SUCCESS: IsraChatbot.exe found."
        } else {
            Write-Host "ERROR: IsraChatbot.exe not found!"
            exit 1
        }
      shell: pwsh

    # ── 8. Inno Setup Installer ───────────────────────────────────────────────
    - name: Install Inno Setup
      run: |
        choco install innosetup -y
      shell: pwsh

    - name: Create Windows Installer
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "dist\installer"
        $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
        & $iscc "installer\windows_setup.iss"

    # ── 9. Upload artifacts ───────────────────────────────────────────────────
    - name: Upload Windows Installer
      uses: actions/upload-artifact@v4
      with:
        name: MachineAI-Chatbot-Windows-Setup
        path: dist/installer/MachineAI_Chatbot_Setup.exe
        if-no-files-found: warn
        retention-days: 14

    - name: Upload raw app folder (fallback)
      uses: actions/upload-artifact@v4
      with:
        name: IsraChatbot-Windows-AppFolder
        path: dist/IsraChatbot/
        if-no-files-found: warn
        retention-days: 7
