name: Build Windows Desktop Installer (Tauri)

on:
  push:
    branches: [ "main", "master" ]
    tags:     [ "v*" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
    # ── 1. Checkout ──────────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Frontend build ────────────────────────────────────────────────────────
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build React Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build

    # ── 3. Python backend sidecar build (PyInstaller → backend_server.exe) ──────
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Upgrade pip and core tools
      run: |
        python -m pip install --upgrade pip
        pip install "packaging>=24.2" --no-cache-dir

    - name: Install CPU-only PyTorch
      run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu --no-cache-dir --no-compile

    - name: Install Python dependencies
      working-directory: ./backend
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        pip install "numpy<2.0.0" --no-cache-dir --no-compile
        pip install -r requirements.txt --no-cache-dir --no-compile
        if ($LASTEXITCODE -ne 0) { Write-Error "pip install failed"; exit 1 }
        pip install pyinstaller platformdirs --no-cache-dir --no-compile
        if ($LASTEXITCODE -ne 0) { Write-Error "pyinstaller install failed"; exit 1 }

    - name: Download Ollama Windows binary
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "bundle_assets\ollama"
        $url = "https://github.com/ollama/ollama/releases/latest/download/ollama-windows-amd64.zip"
        Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\ollama.zip"
        Expand-Archive -Force "$env:TEMP\ollama.zip" "bundle_assets\ollama"
        Write-Host "Ollama binary ready: $(Get-ChildItem bundle_assets\ollama\ollama.exe)"

    - name: Build Python backend sidecar with PyInstaller
      shell: pwsh
      run: pyinstaller --clean -y isra_chatbot.spec

    - name: Verify backend_server.exe was created
      shell: pwsh
      run: |
        if (!(Test-Path "dist\backend_server\backend_server.exe")) {
          Write-Error "PyInstaller failed - backend_server.exe not found!"
          exit 1
        }
        $sizeMB = [math]::Round((Get-Item dist\backend_server\backend_server.exe).Length / 1MB, 1)
        Write-Host "backend_server.exe built successfully ($sizeMB MB)"

    # ── 4. Copy sidecar into src-tauri for bundling ────────────────────────────
    - name: Copy backend sidecar into Tauri resources
      shell: pwsh
      run: |
        # Tauri bundles resources/ into the final app
        # tauri.conf.json maps backend_server/ -> resources/
        # Nothing to do — Tauri reads the path from tauri.conf.json directly
        Write-Host "Sidecar at dist\backend_server\ is ready for Tauri bundling."
        Get-ChildItem dist\backend_server | Select-Object Name, Length | Format-Table

    # ── 5. Rust / Tauri setup ────────────────────────────────────────────────────
    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Cache Rust dependencies
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "src-tauri -> target"

    - name: Install Tauri CLI
      run: cargo install tauri-cli --version "^2" --locked

    # ── 6. Tauri build (produces installer + portable) ──────────────────────────
    - name: Build with Tauri
      shell: pwsh
      env:
        TAURI_SIGNING_PRIVATE_KEY: ""   # Skipping code signing for CI
      run: |
        # Run Tauri build from the src-tauri directory
        cargo tauri build --target x86_64-pc-windows-msvc 2>&1
        if ($LASTEXITCODE -ne 0) { Write-Error "Tauri build failed!"; exit 1 }

    - name: Verify Tauri output
      shell: pwsh
      run: |
        $setupExe = Get-ChildItem -Recurse "src-tauri\target\x86_64-pc-windows-msvc\release\bundle" -Filter "*.exe" | Select-Object -First 1
        if (!$setupExe) {
          Write-Error "Tauri build produced no installer!"
          exit 1
        }
        $sizeMB = [math]::Round($setupExe.Length / 1MB, 1)
        Write-Host "Tauri installer: $($setupExe.FullName) ($sizeMB MB)"

    # ── 7. Upload artifacts ──────────────────────────────────────────────────────
    - name: Upload Windows Installer (NSIS setup.exe)
      uses: actions/upload-artifact@v4
      with:
        name: MachineAI-Chatbot-Windows-Installer
        path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/
        retention-days: 30

    - name: Upload Windows MSI Installer
      uses: actions/upload-artifact@v4
      with:
        name: MachineAI-Chatbot-Windows-MSI
        path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/
        retention-days: 30

    - name: Upload Portable Executable
      uses: actions/upload-artifact@v4
      with:
        name: MachineAI-Chatbot-Windows-Portable-EXE
        path: src-tauri/target/x86_64-pc-windows-msvc/release/ISRA Vision Chatbot.exe
        retention-days: 30
