name: Build Mac Desktop App

on:
  push:
    branches: [ "main", "master" ]
    tags:     [ "v*" ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-14       # Apple Silicon runner (M1)
    timeout-minutes: 120

    steps:
    # ── 1. Checkout ────────────────────────────────────────────────────────────
    - name: Checkout repository
      uses: actions/checkout@v4

    # ── 2. Node.js / Frontend ─────────────────────────────────────────────────
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build React Frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build

    # ── 3. Python / Backend ───────────────────────────────────────────────────
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install CPU-only PyTorch
      run: |
        pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

    - name: Install Python dependencies
      working-directory: ./backend
      run: |
        pip install -r requirements.txt
        pip install pyinstaller pywebview platformdirs

    # ── 4. Ollama binary ──────────────────────────────────────────────────────
    - name: Download Ollama Mac binary (arm64)
      run: |
        mkdir -p bundle_assets/ollama
        curl -fsSL "https://github.com/ollama/ollama/releases/latest/download/ollama-darwin-arm64" \
             -o bundle_assets/ollama/ollama
        chmod +x bundle_assets/ollama/ollama
        echo "Ollama binary ready."

    # ── 5. Pull AI Models ─────────────────────────────────────────────────────
    - name: Cache Ollama models
      id: cache-ollama-models
      uses: actions/cache@v4
      with:
        path: bundle_assets/ollama_models
        key: ollama-models-mac-qwen3-8b-bge-m3-v1

    - name: Pull qwen3:8b and bge-m3
      if: steps.cache-ollama-models.outputs.cache-hit != 'true'
      run: |
        export OLLAMA_MODELS="$(pwd)/bundle_assets/ollama_models"
        mkdir -p "$OLLAMA_MODELS"
        ./bundle_assets/ollama/ollama serve &>/dev/null &
        sleep 10
        ./bundle_assets/ollama/ollama pull qwen3:8b
        ./bundle_assets/ollama/ollama pull bge-m3
        pkill -f "ollama serve" || true

    # ── 6. HuggingFace models ─────────────────────────────────────────────────
    - name: Cache HuggingFace models
      id: cache-hf-models
      uses: actions/cache@v4
      with:
        path: bundle_assets/hf_cache
        key: hf-models-mac-bge-reranker-large-marker-v1

    - name: Download HuggingFace models
      if: steps.cache-hf-models.outputs.cache-hit != 'true'
      env:
        HF_HOME: ${{ github.workspace }}/bundle_assets/hf_cache
      run: |
        python -c "
        from sentence_transformers import CrossEncoder
        CrossEncoder('BAAI/bge-reranker-large')
        print('bge-reranker-large downloaded.')
        "

    # ── 7. PyInstaller ────────────────────────────────────────────────────────
    - name: Build with PyInstaller
      run: |
        pyinstaller --clean -y isra_chatbot.spec

    - name: Verify app bundle
      run: |
        ls -la dist/IsraChatbot/
        echo "Build verified."

    # ── 8. Create .dmg ───────────────────────────────────────────────────────
    - name: Install create-dmg
      run: brew install create-dmg

    - name: Create .dmg installer
      run: |
        mkdir -p dist/installer
        create-dmg \
          --volname "ISRA Vision Chatbot" \
          --window-pos 200 200 \
          --window-size 600 400 \
          --icon-size 100 \
          --hide-extension "IsraChatbot.app" \
          --app-drop-link 425 185 \
          "dist/installer/MachineAI_Chatbot_Setup.dmg" \
          "dist/IsraChatbot.app" || \
        hdiutil create -volname "ISRA Vision Chatbot" \
          -srcfolder "dist/IsraChatbot.app" \
          -ov -format UDZO \
          "dist/installer/MachineAI_Chatbot_Setup.dmg"

    # ── 9. Upload artifact ───────────────────────────────────────────────────
    - name: Upload Mac DMG
      uses: actions/upload-artifact@v4
      with:
        name: MachineAI-Chatbot-Mac-DMG
        path: dist/installer/MachineAI_Chatbot_Setup.dmg
        if-no-files-found: warn
        retention-days: 14
