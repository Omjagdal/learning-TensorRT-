# ═══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — Full Stack Deployment
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  # ── Qdrant Vector Database ─────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: manual_chatbot_qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: manual_chatbot_backend
    ports:
      - "8000:8000"
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_USE_EMBEDDED=false
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    depends_on:
      - qdrant
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  qdrant_data:
